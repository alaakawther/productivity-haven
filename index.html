<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;1,500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="faviconn.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#FFFDF8;min-height:100vh;overflow-x:hidden}
:root{
  --pink:#F4A7C3;--pink-light:#FFD6E8;--pink-pale:#FFF0F7;
  --yellow-light:#FFF9E0;--blue-light:#DDF4FF;--lavender:#D4B8F0;
  --lavender-light:#EEE6FF;--cream:#FFFDF8;--text:#3D2B40;--text-mid:#7A5C7E;--text-light:#B8A0BC;
  --border:rgba(180,140,190,0.18);--card:#fff;
}
.night{
  --bg:#1A1228;--surface:#231A35;--card:#2D2040;--text:#F0E8FF;
  --text-mid:#C0A8D8;--text-light:#8B70A8;--pink:#C4708A;
  --pink-light:#3D1F2E;--lavender:#8B6BAE;--lavender-light:#281A3D;
  --border:rgba(200,170,220,0.12);
}
body.night{background:#1A1228;color:#F0E8FF}
@keyframes float{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:.5}90%{opacity:.3}100%{transform:translateY(-120px) rotate(360deg);opacity:0}}
@keyframes wave{0%{transform:translateX(0)}50%{transform:translateX(-25%)}100%{transform:translateX(-50%)}}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.bubble{position:fixed;pointer-events:none;animation:float linear infinite;bottom:-60px;font-size:18px;opacity:0;z-index:0}
.ocean{position:fixed;bottom:0;left:0;right:0;height:70px;pointer-events:none;z-index:0;overflow:hidden}
.wave-track{position:absolute;bottom:0;width:200%;height:70px;animation:wave 10s linear infinite}
.page{display:none;animation:fadeUp .4s ease}
.page.active{display:block}
nav{position:sticky;top:0;z-index:100;background:rgba(255,253,248,0.93);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);transition:all .4s}
body.night nav{background:rgba(35,26,53,0.95)}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 1.5rem;display:flex;align-items:center;gap:6px;overflow-x:auto;scrollbar-width:none}
.nav-inner::-webkit-scrollbar{display:none}
.logo{display:flex;align-items:center;gap:8px;margin-right:12px;flex-shrink:0}
.logo span{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:var(--pink);white-space:nowrap}
.nav-btn{display:flex;align-items:center;gap:5px;padding:12px 14px;border:none;background:transparent;border-radius:50px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text-mid);font-family:'Nunito',sans-serif;white-space:nowrap;transition:all .3s;flex-shrink:0}
.nav-btn:hover{background:rgba(244,167,195,0.15)}
.nav-btn.active{background:var(--pink);color:#fff}
body.night .nav-btn.active{background:#C4708A}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0}
.logout-btn{padding:7px 16px;border-radius:50px;border:1.5px solid var(--border);background:transparent;color:var(--text-mid);cursor:pointer;font-size:12px;font-family:'Nunito',sans-serif;font-weight:600;transition:all .2s}
.logout-btn:hover{background:var(--pink-light)}
main{max-width:1200px;margin:0 auto;padding:2rem 1.5rem 5rem;position:relative;z-index:1}
h1.page-title{font-family:'Playfair Display',serif;font-size:2.1rem;font-weight:600;color:var(--text);margin:0 0 .3rem}
.subtitle{color:var(--text-mid);font-size:15px;margin:0 0 1.8rem}
.card{background:var(--card);border-radius:20px;padding:1.4rem;border:1px solid var(--border);margin-bottom:0}
.card-title{display:flex;align-items:center;gap:7px;font-size:14px;font-weight:700;color:var(--text);margin:0 0 1rem}
.grid-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem;margin-bottom:1.5rem}
.stat-card{background:var(--card);border-radius:20px;padding:1.2rem;border:1px solid var(--border);text-align:center}
.stat-num{font-size:1.8rem;font-weight:800;color:var(--text)}
.stat-label{font-size:11px;font-weight:600;color:var(--text-mid);margin-top:4px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem}
.progress-bar{background:var(--border);border-radius:50px;height:10px;overflow:hidden;margin:6px 0}
.progress-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--pink),var(--lavender));transition:width .6s ease}
.btn-primary{background:linear-gradient(135deg,var(--pink),var(--lavender));border:none;border-radius:50px;color:#fff;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:transform .2s,box-shadow .2s}
.btn-primary:hover{transform:scale(1.02);box-shadow:0 4px 16px rgba(180,140,190,.25)}
.btn-ghost{background:transparent;border:1.5px solid var(--border);border-radius:50px;color:var(--text-mid);cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s}
.btn-ghost:hover{background:var(--pink-light)}
.mood-btn{flex:1;min-width:70px;padding:1rem .4rem;background:transparent;border:2px solid var(--border);border-radius:18px;cursor:pointer;text-align:center;transition:all .3s;font-family:'Nunito',sans-serif}
.mood-btn:hover{transform:scale(1.05)}
.mood-btn.sel{border-color:var(--pink)}
.sound-btn{padding:10px 6px;border:1.5px solid var(--border);border-radius:14px;background:transparent;cursor:pointer;text-align:center;transition:all .3s;font-family:'Nunito',sans-serif}
.sound-btn.active{background:var(--yellow-light);border-color:#D4A820}
body.night .sound-btn.active{background:#3D3010;border-color:#D4A820}
.task-item{display:flex;align-items:center;gap:10px;padding:1rem 1.2rem;background:var(--card);border-radius:18px;border:1px solid var(--border);margin-bottom:8px;transition:all .3s}
.task-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .3s}
.task-check.done{background:var(--pink);border-color:var(--pink)}
.priority-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:50px}
.priority-high{background:#FFE4E8;color:#D4446A}
.priority-medium{background:#FFF9E0;color:#A08020}
.priority-low{background:#DDF4FF;color:#2060A0}
.tag{font-size:10px;padding:2px 8px;border-radius:50px;background:var(--lavender-light);color:var(--text-mid);font-weight:600}
.form-group{margin-bottom:1rem}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--text-mid);margin-bottom:6px}
.form-input,.form-select{width:100%;padding:10px 14px;border-radius:12px;border:1.5px solid var(--border);background:var(--pink-pale);color:var(--text);font-size:14px;font-family:'Nunito',sans-serif;outline:none;box-sizing:border-box;transition:border .2s}
body.night .form-input,body.night .form-select{background:#231A35;color:#F0D8F8}
.form-input:focus,.form-select:focus{border-color:var(--pink)}
.search-wrap{position:relative;flex:1}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px}
.search-input{width:100%;padding:10px 16px 10px 40px;border-radius:50px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:14px;font-family:'Nunito',sans-serif;outline:none}
.filter-row{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
.filter-sel{padding:9px 16px;border-radius:50px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:13px;font-family:'Nunito',sans-serif;cursor:pointer;outline:none}
.habit-card{background:var(--card);border-radius:20px;padding:1.4rem;border:1px solid var(--border)}
.pom-mode-btn{padding:10px 20px;border-radius:50px;border:1.5px solid var(--border);background:transparent;color:var(--text-mid);cursor:pointer;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;transition:all .3s}
.pom-mode-btn.active{color:#fff;border-color:transparent}
.toggle{width:48px;height:26px;border-radius:50px;cursor:pointer;position:relative;transition:background .3s;flex-shrink:0}
.toggle-knob{width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:3px;transition:left .3s;box-shadow:0 2px 4px rgba(0,0,0,.2)}
.quote-card{border-radius:20px;padding:1.4rem;margin-bottom:1.5rem;border:1px solid var(--border);position:relative;overflow:hidden}
.toast{position:fixed;top:80px;right:20px;z-index:2000;border-radius:20px;padding:13px 18px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 30px rgba(180,140,190,.25);animation:slideIn .4s ease;max-width:320px;border:1.5px solid}
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--cream);position:relative}
body.night .auth-page{background:#1A1228}
.auth-box{background:var(--card);border-radius:24px;padding:2rem;border:1px solid var(--border);box-shadow:0 20px 60px rgba(180,140,190,.15);width:100%;max-width:420px;position:relative;z-index:10}
.tab-row{display:flex;border-radius:50px;padding:4px;margin-bottom:1.5rem}
.tab-btn{flex:1;padding:10px;border-radius:50px;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:'Nunito',sans-serif;transition:all .3s}
.tab-btn.active{background:var(--pink);color:#fff}
body.night .tab-btn.active{background:#C4708A}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:100px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:8px;transition:height .6s ease;min-height:6px}
.mini-mood{display:flex;flex-direction:column;align-items:center;gap:4px;margin-right:6px}
.mood-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
@media(max-width:768px){
  .grid-2{grid-template-columns:1fr}
  .grid-stats{grid-template-columns:repeat(2,1fr)}
  h1.page-title{font-size:1.6rem}
  main{padding:1.5rem 1rem 5rem}
}
</style>
</head>
<body>

<div id="bubbles-container"></div>
<div class="ocean"><div class="wave-track">
  <svg viewBox="0 0 1440 70" preserveAspectRatio="none" style="width:50%;height:100%;float:left"><path d="M0,35 C180,70 360,0 540,35 C720,70 900,0 1080,35 C1260,70 1440,15 1440,35 L1440,70 L0,70 Z" fill="rgba(240,180,210,0.18)"/></svg>
  <svg viewBox="0 0 1440 70" preserveAspectRatio="none" style="width:50%;height:100%;float:left"><path d="M0,35 C180,70 360,0 540,35 C720,70 900,0 1080,35 C1260,70 1440,15 1440,35 L1440,70 L0,70 Z" fill="rgba(240,180,210,0.18)"/></svg>
</div></div>

<div id="app">

<!-- AUTH PAGE -->
<div id="auth-page" class="auth-page">
  <div style="text-align:center;margin-bottom:2rem;position:relative;z-index:10">
    <div style="font-size:44px;margin-bottom:8px">🌸</div>
    <h1 style="font-family:'Playfair Display',serif;font-size:28px;color:var(--text);margin:0 0 4px;font-weight:600">Productivity Haven</h1>
    <p style="color:var(--text-mid);margin:0;font-size:14px">Your cozy space for getting things done</p>
  </div>
  <div class="auth-box">
    <div class="tab-row" style="background:#FFF0F7">
      <button class="tab-btn active" id="tab-login" onclick="switchAuthTab('login')">Login</button>
      <button class="tab-btn" id="tab-register" onclick="switchAuthTab('register')">Register</button>
    </div>
    <h2 id="auth-heading" style="font-size:20px;font-weight:700;color:var(--text);margin:0 0 4px">Welcome back 🩷</h2>
    <p id="auth-sub" style="color:var(--text-light);font-size:13px;margin:0 0 1.2rem">Ready to be productive today?</p>
    <div id="name-field" style="display:none" class="form-group">
      <label class="form-label">Name</label>
      <input class="form-input" id="auth-name" placeholder="Your name">
    </div>
    <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="auth-email" type="email" placeholder="you@example.com"></div>
    <div class="form-group"><label class="form-label">Password</label><input class="form-input" id="auth-password" type="password" placeholder="••••••••"></div>
    <div id="confirm-field" style="display:none" class="form-group">
      <label class="form-label">Confirm password</label>
      <input class="form-input" id="auth-confirm" type="password" placeholder="••••••••">
    </div>
    <p id="auth-err" style="color:#E07090;font-size:13px;margin:-4px 0 10px;font-weight:500;display:none"></p>
    <button class="btn-primary" id="auth-btn" onclick="handleAuth()" style="width:100%;padding:14px;font-size:15px;font-weight:700">Login 🌸</button>
  </div>
  <p style="text-align:center;margin-top:1.5rem;font-size:13px;color:var(--text-light);position:relative;z-index:10">Created by Alaa Kawther Zaiter 🩷</p>
</div>

<!-- MAIN APP -->
<div id="main-app" style="display:none">
  <nav>
    <div class="nav-inner">
      <div class="logo"><span style="font-size:20px">🌸</span><span>Productivity Haven</span></div>
      <button class="nav-btn active" data-page="dashboard" onclick="goPage('dashboard')">🏠 Dashboard</button>
      <button class="nav-btn" data-page="tasks" onclick="goPage('tasks')">📋 Tasks</button>
      <button class="nav-btn" data-page="focus" onclick="goPage('focus')">🎯 Focus</button>
      <button class="nav-btn" data-page="pomodoro" onclick="goPage('pomodoro')">🍅 Pomodoro</button>
      <button class="nav-btn" data-page="habits" onclick="goPage('habits')">💫 Habits</button>
      <button class="nav-btn" data-page="mood" onclick="goPage('mood')">🌸 Mood</button>
      <button class="nav-btn" data-page="stats" onclick="goPage('stats')">📊 Stats</button>
      <button class="nav-btn" data-page="settings" onclick="goPage('settings')">⚙️ Settings</button>
      <div class="nav-right">
        <span id="now-playing" style="font-size:11px;color:var(--text-mid);font-weight:600;background:var(--yellow-light);border-radius:50px;padding:4px 10px;display:none">🎵 Playing</span>
        <span id="nav-greeting" style="font-size:13px;color:var(--text-mid);font-weight:500"></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>
  </nav>
  <main>
    <div id="page-dashboard" class="page active"></div>
    <div id="page-tasks" class="page"></div>
    <div id="page-focus" class="page"></div>
    <div id="page-pomodoro" class="page"></div>
    <div id="page-habits" class="page"></div>
    <div id="page-mood" class="page"></div>
    <div id="page-stats" class="page"></div>
    <div id="page-settings" class="page"></div>
  </main>
  <footer style="text-align:center;padding:1.2rem;border-top:1px solid var(--border);color:var(--text-light);font-size:13px">Created by Alaa Kawther Zaiter 🩷 · Productivity Haven</footer>
</div>
</div>

<div id="toast-container"></div>

<script>
const MOTIVATIONAL=['You\'re doing amazing! 🌸','One task at a time, you\'ve got this 🩷','Future you will thank you 🌊','Progress is still progress 🐱','Keep going, you\'re closer than you think ✨','A little effort every day creates big results 🌼','You are capable of wonderful things 🦋','Rest is productive too 🌙','Small wins still count! 🎀','You\'ve got the heart of a champion 🏆'];
const QUOTES=[{t:'The secret of getting ahead is getting started.',a:'Mark Twain'},{t:'You don\'t have to be great to start, but you have to start to be great.',a:'Zig Ziglar'},{t:'Done is better than perfect.',a:'Sheryl Sandberg'},{t:'Believe you can and you\'re halfway there.',a:'Theodore Roosevelt'},{t:'It always seems impossible until it\'s done.',a:'Nelson Mandela'}];
const MOODS=[{emoji:'✨',label:'Amazing',color:'#F9E4A0'},{emoji:'🌸',label:'Good',color:'#FFD6E8'},{emoji:'🌱',label:'Okay',color:'#B8F0D4'},{emoji:'🌧',label:'Low',color:'#B8E0F7'},{emoji:'🌪',label:'Rough',color:'#D4B8F0'}];
const CATS=['Personal','Work','Health','Creative','Study','Home'];
const PRIS=['low','medium','high'];
const SOUNDS=[{id:'ocean',icon:'🌊',label:'Ocean Waves'},{id:'rain',icon:'🌧',label:'Rain Sounds'},{id:'study',icon:'☕',label:'Study Café'}];

function ls(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

let state={
  users:ls('ph_users',[]),
  currentUser:ls('ph_user',null),
  tasks:ls('ph_tasks',[]),
  habits:ls('ph_habits',[]),
  moods:ls('ph_moods',[]),
  settings:ls('ph_settings',{sound:true,notifs:true,dailyGoal:5,theme:'auto'}),
  currentPage:'dashboard',
  pomMode:'focus',pomTime:25*60,pomRunning:false,pomSessions:0,pomInterval:null,
  activeSound:null,soundVol:50,
  authTab:'login',
  taskSearch:'',taskPriFilter:'all',taskStatusFilter:'all',
  editTaskId:null,
  formData:{title:'',category:'Personal',priority:'medium',dueDate:'',notes:''},
  showTaskForm:false,
  showHabitForm:false,
  newHabit:{name:'',icon:'🌸'},
};

function save(){ss('ph_tasks',state.tasks);ss('ph_habits',state.habits);ss('ph_moods',state.moods);ss('ph_settings',state.settings);ss('ph_users',state.users);ss('ph_user',state.currentUser);}

function isNight(){const h=new Date().getHours();const theme=state.settings.theme;if(theme==='dark')return true;if(theme==='light')return false;return h>=20||h<6;}

function applyTheme(){if(isNight())document.body.classList.add('night');else document.body.classList.remove('night');}

function showToast(msg,type='success'){
  const el=document.getElementById('toast-container');
  const colors={success:{bg:'#FFD6E8',border:'#F4A7C3',icon:'🌸'},motivation:{bg:'#FFF9E0',border:'#D4A820',icon:'✨'},error:{bg:'#FFE4E8',border:'#D4446A',icon:'⚠️'}};
  const c=colors[type]||colors.success;
  const div=document.createElement('div');
  div.className='toast';
  div.style.background=c.bg;div.style.borderColor=c.border;
  div.innerHTML=`<span style="font-size:20px">${c.icon}</span><span style="font-size:14px;font-weight:600;color:#3D2B40;font-family:'Nunito',sans-serif">${msg}</span>`;
  el.appendChild(div);
  setTimeout(()=>{div.remove();},3500);
}

function showMotivation(){showToast(MOTIVATIONAL[Math.floor(Math.random()*MOTIVATIONAL.length)],'motivation');}

// BUBBLES
function initBubbles(){
  const container=document.getElementById('bubbles-container');
  const emojis=['🫧','🫧','🐚','⭐','🌸','💫','🫧'];
  for(let i=0;i<10;i++){
    const d=document.createElement('div');
    d.className='bubble';
    d.style.left=Math.random()*100+'%';
    d.style.fontSize=(14+Math.random()*18)+'px';
    d.style.animationDelay=Math.random()*10+'s';
    d.style.animationDuration=(10+Math.random()*14)+'s';
    d.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    container.appendChild(d);
  }
}

// AUTH
let currentAuthTab='login';
function switchAuthTab(tab){
  currentAuthTab=tab;
  document.getElementById('tab-login').className='tab-btn'+(tab==='login'?' active':'');
  document.getElementById('tab-register').className='tab-btn'+(tab==='register'?' active':'');
  document.getElementById('name-field').style.display=tab==='register'?'block':'none';
  document.getElementById('confirm-field').style.display=tab==='register'?'block':'none';
  document.getElementById('auth-heading').textContent=tab==='login'?'Welcome back 🩷':'Create account';
  document.getElementById('auth-sub').textContent=tab==='login'?'Ready to be productive today?':'Start your productivity journey today';
  document.getElementById('auth-btn').textContent=tab==='login'?'Login 🌸':'Create account 🌸';
  document.getElementById('auth-err').style.display='none';
}

function handleAuth(){
  const email=document.getElementById('auth-email').value;
  const pass=document.getElementById('auth-password').value;
  const errEl=document.getElementById('auth-err');
  errEl.style.display='none';
  if(currentAuthTab==='login'){
    const u=state.users.find(u=>u.email===email&&u.password===pass);
    if(!u){errEl.textContent='Invalid email or password';errEl.style.display='block';return;}
    state.currentUser=u;save();loginSuccess();
  } else {
    const name=document.getElementById('auth-name').value;
    const confirm=document.getElementById('auth-confirm').value;
    if(!name||!email||!pass){errEl.textContent='All fields required';errEl.style.display='block';return;}
    if(pass!==confirm){errEl.textContent='Passwords don\'t match';errEl.style.display='block';return;}
    if(state.users.find(u=>u.email===email)){errEl.textContent='Email already registered';errEl.style.display='block';return;}
    const newU={name,email,password:pass,id:Date.now()};
    state.users.push(newU);state.currentUser=newU;save();loginSuccess();
  }
}

function loginSuccess(){
  document.getElementById('auth-page').style.display='none';
  document.getElementById('main-app').style.display='block';
  document.getElementById('nav-greeting').textContent=`Hi, ${state.currentUser.name.split(' ')[0]} 🩷`;
  renderCurrentPage();
}

function logout(){
  state.currentUser=null;ss('ph_user',null);
  // Stop all audio
  Object.values(audioPool).forEach(a=>{a.pause();a.currentTime=0;});
  state.activeSound=null;soundPausedByTimer=false;
  document.getElementById('auth-page').style.display='flex';
  document.getElementById('main-app').style.display='none';
}

// NAVIGATION
function goPage(p){
  state.currentPage=p;
  document.querySelectorAll('.nav-btn').forEach(b=>{b.classList.toggle('active',b.dataset.page===p);});

// ── REAL AUDIO ENGINE ──────────────────────────────────────────────
const AUDIO_FILES={ocean:'sounds/ocean.mp3',rain:'sounds/rain.mp3',study:'sounds/cafe.mp3'};
const SOUND_LABELS={ocean:'🌊 Ocean Waves',rain:'🌧 Rain Sounds',study:'☕ Study Café'};

// One persistent Audio element per sound — so we never lose the reference mid-render
const audioPool={};
function getAudio(id){
  if(!audioPool[id]){
    audioPool[id]=new Audio(AUDIO_FILES[id]);
    audioPool[id].loop=true;
  }
  return audioPool[id];
}

// Track whether we're in "focus is running" mode
// soundPaused = user explicitly paused via focus-end; re-resumes when focus restarts
let soundPausedByTimer=false;

function updateNowPlaying(){
  const badge=document.getElementById('now-playing');
  if(!badge)return;
  const playing=state.activeSound&&!soundPausedByTimer;
  if(playing){
    badge.textContent='🎵 '+SOUND_LABELS[state.activeSound];
    badge.style.display='inline-block';
  } else {
    badge.style.display='none';
  }
}

// Internal: actually play the audio element
function _playAudio(id){
  const a=getAudio(id);
  a.volume=state.soundVol/100;
  const p=a.play();
  if(p&&p.catch){
    p.catch(()=>{
      // Autoplay blocked — attach a one-time click handler to unlock
      const unlock=()=>{
        a.play().catch(()=>{});
        document.removeEventListener('click',unlock);
      };
      document.addEventListener('click',unlock,{once:true});
      showToast('Click anywhere to start sound 🔊','motivation');
    });
  }
}

function toggleSound(id){
  // Clicking the active sound → stop it
  if(state.activeSound===id){
    getAudio(id).pause();
    getAudio(id).currentTime=0;
    state.activeSound=null;
    soundPausedByTimer=false;
    updateNowPlaying();
    renderCurrentPage();
    return;
  }
  // Stop whatever was playing before
  if(state.activeSound){
    getAudio(state.activeSound).pause();
    getAudio(state.activeSound).currentTime=0;
  }
  state.activeSound=id;
  soundPausedByTimer=false;
  _playAudio(id);
  updateNowPlaying();
  renderCurrentPage();
}

// Called by Pomodoro when FOCUS session STARTS → resume sound
function soundOnFocusStart(){
  if(state.activeSound&&soundPausedByTimer){
    soundPausedByTimer=false;
    _playAudio(state.activeSound);
    updateNowPlaying();
  }
}

// Called when FOCUS session ENDS (break begins or reset) → pause sound
function soundOnFocusEnd(){
  if(state.activeSound&&!soundPausedByTimer){
    soundPausedByTimer=true;
    getAudio(state.activeSound).pause();
    updateNowPlaying();
  }
}

function updateVolume(v){
  state.soundVol=v;
  Object.values(audioPool).forEach(a=>a.volume=v/100);
}

  const d={focus:25*60,shortBreak:5*60,longBreak:15*60};
  clearInterval(pomInterval);pomInterval=null;
  state.pomMode=m;state.pomTime=d[m];state.pomRunning=false;
  // Sound only plays during focus — pause it on break modes
  if(m==='focus'){
    // Don't auto-resume here; user needs to press Start
    soundOnFocusEnd();
  } else {
    soundOnFocusEnd();
  }
  renderPomodoro();
}

function togglePom(){
  state.pomRunning=!state.pomRunning;
  if(state.pomRunning){
    // Focus session started → resume sound if one is selected
    if(state.pomMode==='focus') soundOnFocusStart();
    pomInterval=setInterval(()=>{
      state.pomTime--;
      if(state.pomTime<=0){
        clearInterval(pomInterval);pomInterval=null;
        state.pomRunning=false;
        // Focus session finished → stop sound
        soundOnFocusEnd();
        if(state.pomMode==='focus'){state.pomSessions++;setPomMode('shortBreak');}
        else if(state.pomMode==='shortBreak')setPomMode('longBreak');
        else setPomMode('focus');
        showMotivation();return;
      }
      renderPomodoro();
    },1000);
  } else {
    // User paused → stop sound too
    clearInterval(pomInterval);pomInterval=null;
    soundOnFocusEnd();
  }
  renderPomodoro();
}

function resetPom(){
  const d={focus:25*60,shortBreak:5*60,longBreak:15*60};
  clearInterval(pomInterval);pomInterval=null;
  state.pomTime=d[state.pomMode];state.pomRunning=false;
  soundOnFocusEnd();
  renderPomodoro();
}

// HABITS
const HABIT_ICONS=['🌸','💧','📚','🏃','🧘','🌿','☀️','🎨','✍️','🎵','🥗','😴','💊','🧹','🌙'];
function renderHabits(){
  const el=document.getElementById('page-habits');
  const today=todayStr();

  function streak(h){
    let s=0,d=new Date();
    while(true){if(h.checkIns&&h.checkIns.includes(d.toDateString())){s++;d.setDate(d.getDate()-1);}else break;}
    return s;
  }

  el.innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
    <h1 class="page-title">Habits 💫</h1>
    <button class="btn-primary" onclick="state.showHabitForm=!state.showHabitForm;renderHabits()" style="padding:11px 22px;font-size:14px">+ New Habit</button>
  </div>

  ${state.showHabitForm?`
  <div class="card" style="margin-bottom:1.5rem">
    <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:1rem">New Habit 🌱</div>
    <input class="form-input" id="habit-name" placeholder="Habit name..." value="${state.newHabit.name}" oninput="state.newHabit.name=this.value" style="margin-bottom:12px">
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
      ${HABIT_ICONS.map(ic=>`<button onclick="state.newHabit.icon='${ic}';renderHabits()" style="width:36px;height:36px;border-radius:50%;border:2px solid ${state.newHabit.icon===ic?'#F4A7C3':'var(--border)'};background:${state.newHabit.icon===ic?'#FFD6E8':'transparent'};cursor:pointer;font-size:18px">${ic}</button>`).join('')}
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-primary" onclick="addHabit()" style="padding:10px 22px;font-size:14px">Add Habit 🌸</button>
      <button class="btn-ghost" onclick="state.showHabitForm=false;renderHabits()" style="padding:10px 18px;font-size:14px">Cancel</button>
    </div>
  </div>`:''}

  ${state.habits.length===0?`<div style="text-align:center;padding:4rem;color:var(--text-light)"><div style="font-size:48px;margin-bottom:12px">🌱</div><p>Start building healthy habits today!</p></div>`:`
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem">
    ${state.habits.map(h=>{
      const doneToday=h.checkIns&&h.checkIns.includes(today);
      const s=streak(h);
      return`<div class="habit-card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <span style="font-size:36px">${h.icon}</span>
          <div style="display:flex;align-items:center;gap:4px"><span style="font-size:16px">🔥</span><span style="font-size:14px;font-weight:700;color:var(--text)">${s} days</span></div>
        </div>
        <div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:3px">${h.name}</div>
        <div style="font-size:12px;color:var(--text-mid);margin-bottom:1rem">Total: ${(h.checkIns||[]).length} days</div>
        <div style="display:flex;gap:8px">
          <button onclick="checkInHabit(${h.id})" ${doneToday?'disabled':''} style="flex:1;padding:10px;border-radius:50px;border:none;background:${doneToday?'rgba(180,140,190,0.15)':'linear-gradient(135deg,#F4A7C3,#D4B8F0)'};color:${doneToday?'var(--text-mid)':'#fff'};font-weight:700;cursor:${doneToday?'default':'pointer'};font-family:'Nunito',sans-serif;font-size:14px">
            ${doneToday?'✓ Done Today':'Check In'}
          </button>
          <button onclick="deleteHabit(${h.id})" style="width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:14px">🗑️</button>
        </div>
      </div>`;}).join('')}
  </div>`}`;
}

function addHabit(){
  if(!state.newHabit.name)return;
  state.habits.push({...state.newHabit,id:Date.now(),checkIns:[],streak:0});
  state.newHabit={name:'',icon:'🌸'};state.showHabitForm=false;save();renderHabits();
  showToast('Habit added! Let\'s build great patterns 🌸');
}

function checkInHabit(id){
  const today=todayStr();
  state.habits=state.habits.map(h=>{
    if(h.id!==id||( h.checkIns&&h.checkIns.includes(today)))return h;
    const ci=[...(h.checkIns||[]),today];
    let s=0,d=new Date();while(true){if(ci.includes(d.toDateString())){s++;d.setDate(d.getDate()-1);}else break;}
    showToast(`${h.icon} ${h.name} — ${s} day streak! 🔥`);
    return{...h,checkIns:ci,streak:s};
  });
  save();renderHabits();
}

function deleteHabit(id){state.habits=state.habits.filter(h=>h.id!==id);save();renderHabits();}

// MOOD
function renderMood(){
  const el=document.getElementById('page-mood');
  const today=todayStr();
  const todayMood=state.moods.find(m=>m.date===today);

  el.innerHTML=`
  <h1 class="page-title">Mood Tracker 🌸</h1>
  <p class="subtitle">Check in with yourself every day</p>
  <div class="card" style="max-width:700px;margin-bottom:1.5rem">
    <div style="font-family:'Playfair Display',serif;font-size:20px;color:var(--text);margin-bottom:1.5rem">How are you feeling today?</div>
    <div style="display:flex;gap:10px;margin-bottom:1.2rem;flex-wrap:wrap">
      ${MOODS.map(m=>`<button class="mood-btn" onclick="logMood('${m.label}','${m.emoji}')" style="${todayMood?.mood===m.label?'background:'+m.color+';border-color:'+m.color:''}">
        <div style="font-size:40px;margin-bottom:6px">${m.emoji}</div>
        <div style="font-size:13px;font-weight:600;color:var(--text)">${m.label}</div>
      </button>`).join('')}
    </div>
    <textarea id="mood-note" placeholder="Add a note about your day... (optional)" rows="3" style="width:100%;padding:12px 16px;border-radius:14px;border:1.5px solid var(--border);background:${isNight()?'#231A35':'#FFF0F7'};color:var(--text);font-size:14px;font-family:'Nunito',sans-serif;outline:none;resize:vertical;box-sizing:border-box">${todayMood?.note||''}</textarea>
  </div>
  <h2 style="font-size:20px;font-weight:700;color:var(--text);margin-bottom:1rem">Your Journal 📖</h2>
  ${state.moods.slice().reverse().slice(0,15).map(m=>`
  <div style="display:flex;align-items:center;gap:12px;padding:1rem 1.2rem;background:var(--card);border-radius:16px;border:1px solid var(--border);margin-bottom:8px">
    <div style="width:44px;height:44px;border-radius:50%;background:${MOODS.find(x=>x.label===m.mood)?.color||'#FFD6E8'};display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">${m.emoji}</div>
    <div style="flex:1">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
        <span style="font-weight:700;color:#F4A7C3">${m.mood}</span>
        <span style="font-size:11px;color:var(--text-light)">${new Date(m.date).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
      </div>
      ${m.note?`<p style="margin:0;font-size:13px;color:var(--text-mid)">${m.note}</p>`:''}
    </div>
  </div>`).join('')}
  ${state.moods.length===0?'<p style="color:var(--text-light);text-align:center;padding:2rem">No mood entries yet. Start tracking today! 🌸</p>':''}`;
}

function logMood(mood,emoji){
  const today=todayStr();
  const note=document.getElementById('mood-note')?.value||'';
  state.moods=state.moods.filter(m=>m.date!==today);
  state.moods.push({date:today,mood,emoji,note,timestamp:new Date().toISOString()});
  save();showToast(`Mood logged: ${emoji} ${mood}`);renderMood();
}

// STATS
function renderStats(){
  const el=document.getElementById('page-stats');
  const total=state.tasks.length;const comp=completedTotal();
  const rate=total>0?Math.round((comp/total)*100):0;
  const now=new Date();
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const weekData=days.map((_,i)=>{
    const d=new Date(now);d.setDate(d.getDate()-(6-i));
    return state.tasks.filter(t=>t.completedDate===d.toDateString()).length;
  });
  const maxW=Math.max(...weekData,1);
  const topStreak=state.habits.length>0?Math.max(...state.habits.map(h=>h.streak||0)):0;

  el.innerHTML=`
  <h1 class="page-title">Statistics 📊</h1>
  <div class="grid-stats" style="margin-bottom:1.5rem">
    ${[{l:'Total Tasks',v:total,i:'📋'},{l:'Completed',v:comp,i:'✅'},{l:'Completion Rate',v:rate+'%',i:'📈'},{l:'Focus Sessions',v:state.pomSessions,i:'🍅'},{l:'Top Streak',v:topStreak+'d 🔥',i:'💫'},{l:'Mood Entries',v:state.moods.length,i:'🌸'}].map(s=>`
    <div class="stat-card">
      <div style="font-size:22px;margin-bottom:8px">${s.i}</div>
      <div class="stat-num">${s.v}</div>
      <div class="stat-label">${s.l}</div>
    </div>`).join('')}
  </div>
  <div class="grid-2">
    <div class="card">
      <div class="card-title">📅 Tasks completed this week</div>
      <div class="bar-chart">
        ${weekData.map((v,i)=>`<div class="bar-col">
          <div class="bar" style="height:${(v/maxW)*85+6}px;background:${v>0?'linear-gradient(180deg,#F4A7C3,#D4B8F0)':'var(--border)'}"></div>
          <span style="font-size:9px;color:var(--text-light);font-weight:600">${days[i]}</span>
        </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-title">🎯 Tasks by priority</div>
      ${['high','medium','low'].map(p=>{
        const count=state.tasks.filter(t=>t.priority===p).length;
        const colors={high:'#D4446A',medium:'#E8C840',low:'#5BAAD4'};
        return`<div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:13px;color:var(--text-mid);font-weight:600;text-transform:capitalize">${p}</span>
            <span style="font-size:13px;font-weight:700;color:var(--text)">${count}</span>
          </div>
          <div style="background:var(--border);border-radius:50px;height:8px">
            <div style="width:${total>0?(count/total*100):0}%;height:100%;background:${colors[p]};border-radius:50px;transition:width .5s"></div>
          </div>
        </div>`;}).join('')}
    </div>
  </div>
  <div class="card">
    <div class="card-title">🌸 Recent mood history</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${state.moods.slice(-14).map(m=>`<div class="mini-mood">
        <div class="mood-circle" style="background:${MOODS.find(x=>x.label===m.mood)?.color||'#FFD6E8'}">${m.emoji}</div>
        <span style="font-size:9px;color:var(--text-light)">${new Date(m.date).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
      </div>`).join('')}
      ${state.moods.length===0?'<p style="color:var(--text-light);font-size:14px">No mood data yet 🌸</p>':''}
    </div>
  </div>`;
}

// SETTINGS
function renderSettings(){
  const el=document.getElementById('page-settings');
  const s=state.settings;
  el.innerHTML=`
  <h1 class="page-title">Settings ⚙️</h1>
  <div style="max-width:700px">
    <div class="card" style="margin-bottom:1rem">
      <div class="card-title">👤 Account</div>
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#F4A7C3,#D4B8F0);display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;font-weight:700;flex-shrink:0">${state.currentUser?.name?.[0]?.toUpperCase()||'?'}</div>
        <div>
          <p style="margin:0;font-weight:700;color:var(--text)">${state.currentUser?.name}</p>
          <p style="margin:0;font-size:13px;color:var(--text-mid)">${state.currentUser?.email}</p>
        </div>
      </div>
    </div>
    <div class="card" style="margin-bottom:1rem">
      <div class="card-title">🎨 Appearance</div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><p style="margin:0 0 2px;font-weight:600;color:var(--text)">Theme</p><p style="margin:0;font-size:12px;color:var(--text-mid)">Choose your visual style</p></div>
        <select class="filter-sel" onchange="updateSetting('theme',this.value)">
          <option value="auto"${s.theme==='auto'?' selected':''}>Auto</option>
          <option value="light"${s.theme==='light'?' selected':''}>Light</option>
          <option value="dark"${s.theme==='dark'?' selected':''}>Dark</option>
        </select>
      </div>
    </div>
    <div class="card" style="margin-bottom:1.5rem">
      <div class="card-title">⚡ Preferences</div>
      ${[{k:'sound',l:'Sound effects',d:'Play sounds for actions'},{k:'notifs',l:'Notifications',d:'Receive task reminders'}].map(p=>`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <div><p style="margin:0 0 2px;font-weight:600;color:var(--text)">${p.l}</p><p style="margin:0;font-size:12px;color:var(--text-mid)">${p.d}</p></div>
        <div class="toggle" onclick="toggleSetting('${p.k}')" style="background:${s[p.k]?'#F4A7C3':'var(--border)'}">
          <div class="toggle-knob" style="left:${s[p.k]?'25px':'3px'}"></div>
        </div>
      </div>`).join('')}
      <div>
        <p style="margin:0 0 6px;font-weight:600;color:var(--text)">Daily goal target</p>
        <p style="margin:0 0 8px;font-size:12px;color:var(--text-mid)">Number of tasks to complete daily</p>
        <input type="number" min="1" max="50" value="${s.dailyGoal}" onchange="updateSetting('dailyGoal',+this.value)" style="width:80px;padding:8px 12px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;outline:none">
      </div>
    </div>
    <button class="btn-primary" onclick="showToast('Settings saved! 🌸')" style="width:100%;padding:16px;font-size:16px">Save settings 🌸</button>
  </div>`;
}

function updateSetting(k,v){state.settings[k]=v;save();applyTheme();renderSettings();}
function toggleSetting(k){state.settings[k]=!state.settings[k];save();renderSettings();}

// INIT
function init(){
  initBubbles();
  applyTheme();
  if(state.currentUser){loginSuccess();}
}

init();
</script>
